services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source for live reload (hot-reload via Nest --watch)
      - ./packages/backend:/app/packages/backend
      - ./packages/shared:/app/packages/shared
      # Anonymous volumes keep container node_modules — prevents host shadowing
      - /app/node_modules
      - /app/packages/backend/node_modules
      - /app/packages/shared/node_modules
      # Named volume for SQLite data persistence across container restarts
      - db-data:/app/packages/backend/data
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./data/dev.db
    command: pnpm run start:dev

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      # Mount source for live reload (Vite HMR)
      - ./packages/frontend:/app/packages/frontend
      - ./packages/shared:/app/packages/shared
      # Anonymous volumes keep container node_modules
      - /app/node_modules
      - /app/packages/frontend/node_modules
      - /app/packages/shared/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    command: pnpm run dev -- --host

volumes:
  db-data:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
